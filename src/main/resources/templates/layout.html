<!DOCTYPE html>
<html lang="id" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{base :: head(title=${title})}"></head>
<body>
    <!-- NAVBAR -->
    <nav class="navbar navbar-dark bg-sage shadow-sm fixed-top">
        <div class="container-fluid">
            <div class="d-flex align-items-center">
                <button class="btn text-white mobile-toggle me-2" id="sidebarToggle">
                    <i class="fas fa-bars"></i>
                </button>
                <a class="navbar-brand fw-bold" href="/">
                    <i class="fas fa-mug-hot me-2"></i>Café Kopitiam33
                </a>
            </div>
            <div class="d-flex align-items-center gap-3">
                <span th:if="${session.loggedUser != null}" class="text-white">
                    <i class="fas fa-user-circle me-1"></i> 
                    <span th:text="${session.loggedUser.fullName}"></span>
                    <span th:if="${session.loggedUser.role == 'ADMIN'}" class="badge bg-warning ms-2">Admin</span>
                </span>
                <a th:if="${session.loggedUser != null and session.loggedUser.role == 'ADMIN'}" href="/admin" class="btn btn-sm btn-warning me-2">
                    <i class="fas fa-cogs"></i> Admin Panel
                </a>
                <a th:if="${session.loggedUser != null}" href="/logout" class="btn btn-sm btn-light">
                    <i class="fas fa-sign-out-alt"></i> Logout
                </a>
                <a th:if="${session.loggedUser == null}" href="/login" class="btn btn-sm btn-light">
                    <i class="fas fa-sign-in-alt"></i> Login
                </a>
            </div>
        </div>
    </nav>
    
    <!-- MAIN CONTENT WITH SIDEBAR -->
    <div class="d-flex" style="margin-top: 70px;">
        <!-- SIDEBAR -->
        <div class="sidebar" id="sidebar">
            <div class="py-3">
                <div class="text-center mb-4">
                    <i class="fas fa-coffee fa-3x text-white"></i>
                    <h6 class="text-white mt-2">Menu Navigasi</h6>
                </div>
                <nav class="nav flex-column">
                    <a class="nav-link" th:classappend="${activePage == 'home'} ? 'active' : ''" href="/">
                        <i class="fas fa-home"></i> Dashboard
                    </a>
                    <a class="nav-link" th:classappend="${activePage == 'menu'} ? 'active' : ''" href="/menu">
                        <i class="fas fa-utensils"></i> Menu
                    </a>
                    <a class="nav-link" th:classappend="${activePage == 'reservasi'} ? 'active' : ''" href="/reservasi">
                        <i class="fas fa-calendar-alt"></i> Reservasi
                    </a>
                    <a class="nav-link" th:classappend="${activePage == 'testimoni'} ? 'active' : ''" href="/testimoni">
                        <i class="fas fa-comment"></i> Testimoni
                    </a>
                    <a class="nav-link" th:classappend="${activePage == 'galeri'} ? 'active' : ''" href="/galeri">
                        <i class="fas fa-images"></i> Galeri
                    </a>
                    <a class="nav-link" th:classappend="${activePage == 'promo'} ? 'active' : ''" href="/promo">
                        <i class="fas fa-tags"></i> Promo
                    </a>
                </nav>
            </div>
        </div>
        
        <!-- CONTENT -->
        <div class="content-area flex-grow-1 p-4">
            <th:block th:replace="${pageContent}" />
        </div>
    </div>
    
    <!-- SCRIPTS -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.getElementById('sidebarToggle')?.addEventListener('click', function() {
            document.getElementById('sidebar').classList.toggle('show');
        });
        document.addEventListener('click', function(event) {
            const sidebar = document.getElementById('sidebar');
            const toggleBtn = document.getElementById('sidebarToggle');
            if (window.innerWidth <= 768 && sidebar?.classList.contains('show')) {
                if (!sidebar.contains(event.target) && !toggleBtn?.contains(event.target)) {
                    sidebar.classList.remove('show');
                }
            }
        });
    </script>
</body>
</html>
