<!DOCTYPE html>
<html lang="id" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{base :: head(title='Keranjang Belanja')}"></head>

<body>

    <div th:replace="~{base :: toast}"></div>
    <div th:replace="~{base :: navbar}"></div>

    <div class="d-flex" style="margin-top: 70px;">
        <div th:replace="~{base :: sidebar}"></div>

        <div class="content-area flex-grow-1 p-4">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h2 class="text-wood">
                    <i class="fas fa-shopping-cart me-2"></i>
                    Keranjang Belanja
                </h2>
                <a href="/menu" class="btn btn-sage">
                    <i class="fas fa-arrow-left me-1"></i>
                    Kembali ke Menu
                </a>
            </div>

            <!-- Alert Sukses -->
            <div id="successAlert" class="alert alert-success alert-dismissible fade show" style="display: none;">
                <i class="fas fa-check-circle me-2"></i>
                <span id="successMessage"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>

            <div class="card shadow-sm border-0">
                <div class="card-body">
                    <div class="table-responsive">
                        <table class="table table-hover align-middle">
                            <thead class="table-light">
                                <tr>
                                    <th>Gambar</th>
                                    <th>Menu</th>
                                    <th>Harga</th>
                                    <th>Jumlah</th>
                                    <th>Subtotal</th>
                                    <th>Aksi</th>
                                </tr>
                            </thead>
                            <tbody id="cartItems">
                                <tr>
                                    <td colspan="6" class="text-center py-5 text-muted">
                                        <i class="fas fa-shopping-cart fa-3x mb-3 opacity-50"></i>
                                        <p class="mb-2">Keranjang masih kosong</p>
                                        <a href="/menu" class="btn btn-sage btn-sm">
                                            <i class="fas fa-utensils me-1"></i> Mulai Belanja
                                        </a>
                                    </td>
                                </tr>
                            </tbody>
                            <tfoot id="cartFooter" style="display: none;">
                                <tr class="table-light">
                                    <td colspan="4" class="text-end fw-bold">Total: </td>
                                    <td colspan="2">
                                        <strong class="text-success fs-4" id="cartTotal">Rp 0</strong>
                                    </td>
                                </tr>
                            </tfoot>
                        </table>
                    </div>
                </div>
            </div>

            <div class="mt-4 text-end" id="checkoutSection" style="display: none;">
                <button type="button" class="btn btn-sage btn-lg" onclick="proceedToCheckout()">
                    <i class="fas fa-check me-2"></i> Konfirmasi Pesanan
                </button>
            </div>
        </div>
    </div>

    <!-- CHECKOUT MODAL -->
    <div class="modal fade" id="checkoutModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header text-white" style="background: linear-gradient(135deg, #8BA888 0%, #6B8A6B 100%);">
                    <h5 class="modal-title">
                        <i class="fas fa-clipboard-list me-2"></i>
                        Konfirmasi Pesanan
                    </h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <form id="checkoutForm" th:action="@{/pesanan/add}" method="post">
                    <div class="modal-body">
                        <input type="hidden" name="cartData" id="cartDataInput">
                        
                        <div class="mb-3">
                            <label class="form-label fw-bold">Nama Lengkap <span class="text-danger">*</span></label>
                            <input type="text" class="form-control" name="customerName" id="customerName" required>
                        </div>
                        
                        <div class="mb-3">
                            <label class="form-label fw-bold">Catatan (opsional)</label>
                            <textarea class="form-control" name="notes" id="notes" rows="2" placeholder="Contoh: Tidak pedas, extra sambal, dll"></textarea>
                        </div>
                        
                        <hr>
                        
                        <div class="mb-3">
                            <h6 class="fw-bold"><i class="fas fa-receipt me-1"></i>Ringkasan Pesanan:</h6>
                            <div id="orderSummary" class="bg-light p-3 rounded" style="max-height: 200px; overflow-y: auto;">
                                <p class="text-muted text-center mb-0">Belum ada item</p>
                            </div>
                            <div class="mt-2 text-end">
                                <strong>Total: <span id="orderTotal" class="text-success fs-5">Rp 0</span></strong>
                            </div>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Batal</button>
                        <button type="submit" class="btn btn-sage"><i class="fas fa-check me-1"></i>Pesan Sekarang</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <div th:replace="~{base :: scripts}"></div>

    <style>
        .text-wood {
            color: #5A3E2B;
            font-weight: 600;
        }
        .content-area {
            background: linear-gradient(135deg, #f8f9fa 0%, #f0f2f5 100%);
            min-height: calc(100vh - 70px);
        }
        .btn-sage {
            background: linear-gradient(135deg, #8BA888 0%, #6B8A6B 100%);
            color: white;
            border: none;
        }
        .btn-sage:hover {
            background: linear-gradient(135deg, #6B8A6B 0%, #5A7A5A 100%);
            color: white;
            transform: translateY(-2px);
        }
        .table-light th {
            background: linear-gradient(135deg, #8BA888 0%, #6B8A6B 100%);
            color: white;
        }
        .cart-img {
            width: 50px;
            height: 50px;
            object-fit: cover;
            border-radius: 8px;
        }
    </style>

    <script>
        let cart = [];

        document.addEventListener('DOMContentLoaded', function() {
            loadCart();
            displayCart();
            
            // Cek apakah ada parameter success dari redirect
            const urlParams = new URLSearchParams(window.location.search);
            if (urlParams.has('success')) {
                showSuccessAlert('Pesanan berhasil dikirim! Keranjang telah dikosongkan.');
                clearCartAndDisplay();
            }
        });

        function loadCart() {
            const savedCart = localStorage.getItem('customerCart');
            if (savedCart) {
                cart = JSON.parse(savedCart);
                // Pastikan setiap item memiliki imageUrl (untuk gambar default)
                for (let i = 0; i < cart.length; i++) {
                    if (!cart[i].imageUrl) {
                        cart[i].imageUrl = '/uploads/default.jpg';
                    }
                }
            }
        }

        function saveCart() {
            localStorage.setItem('customerCart', JSON.stringify(cart));
        }

        function clearCart() {
            cart = [];
            saveCart();
            updateCartCountInMenu();
        }

        function clearCartAndDisplay() {
            cart = [];
            saveCart();
            displayCart();
            updateCartCountInMenu();
        }

        function displayCart() {
            const cartItems = document.getElementById('cartItems');
            const cartFooter = document.getElementById('cartFooter');
            const checkoutSection = document.getElementById('checkoutSection');

            if (cart.length === 0) {
                cartItems.innerHTML = '<tr><td colspan="6" class="text-center py-5 text-muted">' +
                    '<i class="fas fa-shopping-cart fa-3x mb-3 opacity-50"></i>' +
                    '<p class="mb-2">Keranjang masih kosong</p>' +
                    '<a href="/menu" class="btn btn-sage btn-sm"><i class="fas fa-utensils me-1"></i> Mulai Belanja</a>' +
                    '</td></tr>';
                cartFooter.style.display = 'none';
                checkoutSection.style.display = 'none';
                return;
            }

            let total = 0;
            let html = '';

            for (let i = 0; i < cart.length; i++) {
                const item = cart[i];
                const subtotal = item.price * item.quantity;
                total += subtotal;

                // Gunakan imageUrl jika ada, atau default
                const imageUrl = item.imageUrl || '/uploads/default.jpg';

                html += '<tr>' +
                    '<td><img src="' + escapeHtml(imageUrl) + '" class="cart-img" alt="' + escapeHtml(item.name) + '" onerror="this.src=\'/uploads/default.jpg\'"></td>' +
                    '<td><strong>' + escapeHtml(item.name) + '</strong></td>' +
                    '<td>Rp ' + formatNumber(item.price) + '</td>' +
                    '<td>' +
                    '<div class="d-flex align-items-center gap-2">' +
                    '<button class="btn btn-sm btn-outline-secondary" onclick="updateQuantity(' + item.id + ', -1)">-</button>' +
                    '<span style="min-width: 30px; text-align: center;">' + item.quantity + '</span>' +
                    '<button class="btn btn-sm btn-outline-secondary" onclick="updateQuantity(' + item.id + ', 1)">+</button>' +
                    '</div>' +
                    '</td>' +
                    '<td>Rp ' + formatNumber(subtotal) + '</td>' +
                    '<td><button class="btn btn-sm btn-danger" onclick="removeFromCart(' + item.id + ')"><i class="fas fa-trash"></i></button></td>' +
                    '</tr>';
            }

            cartItems.innerHTML = html;
            document.getElementById('cartTotal').innerHTML = 'Rp ' + formatNumber(total);
            cartFooter.style.display = 'table-row-group';
            checkoutSection.style.display = 'block';
        }

        function updateQuantity(id, change) {
            for (let i = 0; i < cart.length; i++) {
                if (cart[i].id === id) {
                    cart[i].quantity += change;
                    if (cart[i].quantity <= 0) {
                        cart.splice(i, 1);
                    }
                    break;
                }
            }
            saveCart();
            displayCart();
            updateCartCountInMenu();
        }

        function removeFromCart(id) {
            cart = cart.filter(item => item.id !== id);
            saveCart();
            displayCart();
            updateCartCountInMenu();
        }

        function updateCartCountInMenu() {
            const totalItems = cart.reduce((sum, item) => sum + item.quantity, 0);
            localStorage.setItem('cartCount', totalItems);
        }

        function proceedToCheckout() {
            if (cart.length === 0) {
                alert('Keranjang masih kosong!');
                return;
            }

            let total = 0;
            let summaryHtml = '';

            for (let i = 0; i < cart.length; i++) {
                const item = cart[i];
                const subtotal = item.price * item.quantity;
                total += subtotal;
                summaryHtml += '<div class="d-flex justify-content-between mb-2">' +
                    '<span>' + escapeHtml(item.name) + ' x ' + item.quantity + '</span>' +
                    '<span>Rp ' + formatNumber(subtotal) + '</span>' +
                    '</div>';
            }

            document.getElementById('orderSummary').innerHTML = summaryHtml;
            document.getElementById('orderTotal').innerHTML = 'Rp ' + formatNumber(total);
            document.getElementById('cartDataInput').value = JSON.stringify(cart);

            new bootstrap.Modal(document.getElementById('checkoutModal')).show();
        }

        function validateAndSubmit(event) {
            event.preventDefault();
            
            const customerName = document.getElementById('customerName').value;

            if (!customerName || customerName.trim() === '') {
                alert('Nama lengkap harus diisi!');
                return false;
            }
            
            // Submit form menggunakan fetch
            const formData = new FormData(document.getElementById('checkoutForm'));
            
            fetch('/pesanan/add', {
                method: 'POST',
                body: formData
            })
            .then(response => {
                if (response.ok) {
                    // Kosongkan keranjang
                    clearCart();
                    // Tutup modal
                    bootstrap.Modal.getInstance(document.getElementById('checkoutModal')).hide();
                    // Redirect ke halaman cart dengan parameter success
                    window.location.href = '/pesanan/riwayat';
                } else {
                    alert('Gagal mengirim pesanan! Silakan coba lagi.');
                }
            })
            .catch(error => {
                console.error('Error:', error);
                alert('Terjadi kesalahan! Silakan coba lagi.');
            });
            
            return false;
        }

        function showSuccessAlert(message) {
            const alertDiv = document.getElementById('successAlert');
            const messageSpan = document.getElementById('successMessage');
            messageSpan.textContent = message;
            alertDiv.style.display = 'block';
            
            setTimeout(function() {
                alertDiv.style.display = 'none';
            }, 5000);
        }

        function formatNumber(num) {
            return num.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ".");
        }

        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }

        // Attach form submit handler
        document.getElementById('checkoutForm')?.addEventListener('submit', validateAndSubmit);
    </script>
</body>
</html>
