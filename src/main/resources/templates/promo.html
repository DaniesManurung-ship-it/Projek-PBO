<!DOCTYPE html>
<html lang="id" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{base :: head(title='Promo Spesial')}"></head>
<body>
    <div th:replace="~{base :: toast}"></div>
    <div th:replace="~{base :: navbar}"></div>
    
    <div class="d-flex" style="margin-top: 70px;">
        <div th:replace="~{base :: sidebar}"></div>
        
        <div class="content-area flex-grow-1 p-4">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h2 class="text-wood"><i class="fas fa-tags me-2"></i>Promo Spesial</h2>
                <a href="/cart" class="btn btn-sage">
                    <i class="fas fa-shopping-cart me-1"></i> Keranjang
                    <span id="cartCount" class="badge bg-danger ms-1 rounded-pill" style="display: none;">0</span>
                </a>
            </div>
            
            <div class="row">
                <div class="col-md-4 mb-4" th:each="promo : ${promos}" th:if="${promo.active}">
                    <div class="card h-100 shadow-sm">
                        <div class="position-relative">
                            <img th:src="${promo.image != null ? promo.image : '/images/default-promo.jpg'}" class="card-img-top" style="height: 200px; object-fit: cover;">
                            <div class="position-absolute top-0 end-0 bg-danger text-white px-2 py-1 rounded m-2 fw-bold">-<span th:text="${promo.discount}"></span>%</div>
                        </div>
                        <div class="card-body">
                            <h5 class="card-title fw-bold" th:text="${promo.name}"></h5>
                            <p class="card-text text-muted small" th:text="${promo.description}"></p>
                            <div class="d-flex justify-content-between align-items-center mb-2">
                                <span class="text-muted text-decoration-line-through">Rp <span th:text="${#numbers.formatInteger(promo.originalPrice, 0, 'COMMA')}"></span></span>
                                <span class="text-danger fw-bold">Rp <span th:text="${#numbers.formatInteger(promo.originalPrice - (promo.originalPrice * promo.discount / 100), 0, 'COMMA')}"></span></span>
                            </div>
                            <small class="text-muted">
                                <i class="far fa-calendar-alt me-1"></i>
                                <span th:text="${#temporals.format(promo.startDate, 'dd MMM yyyy')}"></span> - 
                                <span th:text="${#temporals.format(promo.endDate, 'dd MMM yyyy')}"></span>
                            </small>
                            <div class="mt-2">
                                <span class="badge bg-success">Aktif</span>
                            </div>
                            <div class="mt-3">
                                <button type="button" 
                                        class="btn btn-primary btn-sm w-100" 
                                        th:attr="
                                            data-id=${promo.id}, 
                                            data-name=${promo.name}, 
                                            data-price=${promo.originalPrice - (promo.originalPrice * promo.discount / 100)},
                                            data-image=${promo.image != null ? promo.image : '/images/default-promo.jpg'}"
                                        onclick="addToCart(this)">
                                    <i class="fas fa-cart-plus me-1"></i> Pesan
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
                <div th:if="${#lists.isEmpty(promos)}" class="col-12 text-center py-5">
                    <i class="fas fa-tags fa-3x text-muted mb-2"></i>
                    <p class="text-muted">Belum ada promo</p>
                </div>
            </div>
        </div>
    </div>
    
    <div th:replace="~{base :: scripts}"></div>
    
    <script>
        let cart = [];

        document.addEventListener('DOMContentLoaded', function() {
            loadCart();
            updateCartCount();
        });

        function saveCart() {
            localStorage.setItem('customerCart', JSON.stringify(cart));
        }

        function loadCart() {
            const savedCart = localStorage.getItem('customerCart');
            if (savedCart) {
                cart = JSON.parse(savedCart);
            }
        }

        function updateCartCount() {
            let totalItems = 0;
            for (let i = 0; i < cart.length; i++) {
                totalItems += cart[i].quantity;
            }
            const cartCountElement = document.getElementById('cartCount');
            if (cartCountElement) {
                cartCountElement.textContent = totalItems;
                cartCountElement.style.display = totalItems > 0 ? 'inline-block' : 'none';
            }
        }

        function addToCart(button) {
            const id = parseInt(button.getAttribute('data-id'));
            const name = button.getAttribute('data-name');
            const price = parseInt(button.getAttribute('data-price'));
            const imageUrl = button.getAttribute('data-image') || '/images/default-promo.jpg';
            
            const existingItem = cart.find(item => item.id === id);
            if (existingItem) {
                existingItem.quantity++;
            } else {
                cart.push({
                    id: id,
                    name: name,
                    price: price,
                    quantity: 1,
                    imageUrl: imageUrl
                });
            }
            saveCart();
            updateCartCount();
            alert(name + ' ditambahkan ke keranjang!');
        }
    </script>
</body>
</html>
