<!DOCTYPE html>
<html lang="id" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{base :: head(title='Promo Spesial')}"></head>
<body>
    <div th:replace="~{base :: toast}"></div>
    <div th:replace="~{base :: navbar}"></div>
    
    <div class="d-flex" style="margin-top: 70px;">
        <div th:replace="~{base :: sidebar}"></div>
        
        <div class="content-area flex-grow-1 p-4">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h2 class="text-wood"><i class="fas fa-tags me-2"></i>Promo Spesial</h2>
                <button type="button" class="btn btn-sage" data-bs-toggle="modal" data-bs-target="#cartModal" onclick="viewCart()">
                    <i class="fas fa-shopping-cart me-1"></i> Keranjang
                    <span id="cartCount" class="badge bg-danger ms-1 rounded-pill" style="display: none;">0</span>
                </button>
            </div>
            
            <!-- Alert untuk pesanan berhasil -->
            <div th:if="${param.ordered != null}" class="alert alert-success alert-dismissible fade show" role="alert" id="successAlert">
                <i class="fas fa-check-circle me-2"></i> Pesanan berhasil dikirim! Silakan tunggu konfirmasi dari admin.
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>
            
            <!-- Alert untuk error -->
            <div th:if="${param.error != null}" class="alert alert-danger alert-dismissible fade show" role="alert">
                <i class="fas fa-exclamation-circle me-2"></i> Gagal mengirim pesanan!
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>
            
            <div class="row" id="promoContainer">
                <div class="col-md-4 mb-4" th:each="promo : ${promos}" th:if="${promo.active}" th:attr="data-category='promo'">
                    <div class="card h-100 shadow-sm">
                        <div class="position-relative">
                            <img th:src="${promo.image != null ? promo.image : '/images/default-promo.jpg'}" class="card-img-top" alt="Promo" style="height: 200px; object-fit: cover;">
                            <div class="position-absolute top-0 end-0 bg-danger text-white px-2 py-1 rounded m-2 fw-bold">-<span th:text="${promo.discount}"></span>%</div>
                        </div>
                        <div class="card-body d-flex flex-column">
                            <div class="d-flex justify-content-between align-items-start mb-2">
                                <h5 class="card-title mb-0 fw-bold" th:text="${promo.name}"></h5>
                                <span class="badge bg-warning text-dark">🔥 Promo</span>
                            </div>
                            <p class="card-text text-muted small flex-grow-1" th:text="${promo.description}"></p>
                            <div class="mt-2">
                                <small class="text-muted">
                                    <i class="far fa-calendar-alt me-1"></i>
                                    <span th:text="${#temporals.format(promo.startDate, 'dd MMM yyyy')}"></span> - 
                                    <span th:text="${#temporals.format(promo.endDate, 'dd MMM yyyy')}"></span>
                                </small>
                            </div>
                            <div class="d-flex justify-content-between align-items-center mt-3">
                                <div>
                                    <span class="text-muted text-decoration-line-through small">Rp <span th:text="${#numbers.formatInteger(promo.originalPrice, 0, 'COMMA')}"></span></span>
                                    <br>
                                    <span class="text-danger fw-bold fs-5">Rp <span th:text="${#numbers.formatInteger(promo.originalPrice - (promo.originalPrice * promo.discount / 100), 0, 'COMMA')}"></span></span>
                                </div>
                                <button type="button" 
                                        class="btn btn-primary btn-sm" 
                                        th:attr="data-id=${promo.id}, data-name=${promo.name}, data-price=${promo.originalPrice - (promo.originalPrice * promo.discount / 100)}"
                                        onclick="addPromoToCart(this)">
                                    <i class="fas fa-cart-plus me-1"></i> Pesan
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
                <div th:if="${#lists.isEmpty(promos)}" class="col-12 text-center py-5">
                    <i class="fas fa-tags fa-3x text-muted mb-3"></i>
                    <p class="text-muted">Belum ada promo</p>
                </div>
            </div>
        </div>
    </div>
    
    <!-- CART MODAL -->
    <div class="modal fade" id="cartModal" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header text-white" style="background: linear-gradient(135deg, #8BA888 0%, #6B8A6B 100%);">
                    <h5 class="modal-title"><i class="fas fa-shopping-cart me-2"></i>Keranjang Pesanan</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div class="table-responsive">
                        <table class="table table-hover align-middle">
                            <thead class="table-light">
                                <tr>
                                    <th>Menu</th>
                                    <th>Harga</th>
                                    <th>Jumlah</th>
                                    <th>Subtotal</th>
                                    <th>Aksi</th>
                                </tr>
                            </thead>
                            <tbody id="cartItems">
                                <tr>
                                    <td colspan="5" class="text-center py-4 text-muted">
                                        <i class="fas fa-shopping-cart fa-2x mb-2 opacity-50"></i>
                                        <p class="mb-0">Keranjang masih kosong</p>
                                    </td>
                                </tr>
                            </tbody>
                            <tfoot id="cartFooter" style="display: none;">
                                <tr class="table-light">
                                    <td colspan="3" class="text-end fw-bold">Total:</td>
                                    <td colspan="2"><strong class="text-success fs-5" id="cartTotal">Rp 0</strong></td>
                                </tr>
                            </tfoot>
                        </table>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Tutup</button>
                    <button type="button" class="btn btn-sage" onclick="proceedToCheckout()">
                        <i class="fas fa-check me-1"></i> Konfirmasi Pesanan
                    </button>
                </div>
            </div>
        </div>
    </div>
    
    <!-- CHECKOUT MODAL -->
    <div class="modal fade" id="checkoutModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header text-white" style="background: linear-gradient(135deg, #8BA888 0%, #6B8A6B 100%);">
                    <h5 class="modal-title"><i class="fas fa-clipboard-list me-2"></i>Konfirmasi Pesanan</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <form th:action="@{/pesanan/add}" method="post" onsubmit="return validateAndSubmit()">
                    <div class="modal-body">
                        <input type="hidden" name="cartData" id="cartDataInput">
                        <div class="mb-3">
                            <label class="form-label fw-bold">Nama Lengkap <span class="text-danger">*</span></label>
                            <input type="text" class="form-control" name="customerName" id="customerName" placeholder="Masukkan nama Anda" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-bold">Nomor Meja <span class="text-danger">*</span></label>
                            <input type="number" class="form-control" name="tableNumber" id="tableNumber" placeholder="Contoh: 5" min="1" max="20" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-bold">Catatan (opsional)</label>
                            <textarea class="form-control" name="notes" id="notes" rows="2" placeholder="Contoh: Tidak pedas, extra sambal"></textarea>
                        </div>
                        <hr>
                        <div class="mb-3">
                            <h6 class="fw-bold"><i class="fas fa-receipt me-1"></i>Ringkasan Pesanan:</h6>
                            <div id="orderSummary" class="bg-light p-3 rounded" style="max-height: 200px; overflow-y: auto;">
                                <p class="text-muted text-center mb-0">Belum ada item</p>
                            </div>
                            <div class="mt-2 text-end">
                                <strong>Total: <span id="orderTotal" class="text-success fs-5">Rp 0</span></strong>
                            </div>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Batal</button>
                        <button type="submit" class="btn btn-sage"><i class="fas fa-check me-1"></i>Pesan Sekarang</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
    
    <div th:replace="~{base :: scripts}"></div>
    
    <style>
        .price {
            color: #6B8A6B;
            font-size: 1.1rem;
        }

        .card {
            border-radius: 16px;
            overflow: hidden;
            transition: 0.3s;
            border: none;
        }

        .card:hover {
            transform: translateY(-5px);
        }

        .btn-primary {
            background: linear-gradient(135deg, #8BA888 0%, #6B8A6B 100%);
            border: none;
        }

        .btn-primary:hover {
            background: linear-gradient(135deg, #6B8A6B 0%, #5A7A5A 100%);
        }
        
        .btn-sage {
            background: linear-gradient(135deg, #8BA888 0%, #6B8A6B 100%);
            color: white;
            border: none;
        }
        
        .btn-sage:hover {
            background: linear-gradient(135deg, #6B8A6B 0%, #5A7A5A 100%);
            color: white;
        }
        
        .table-light th {
            background: linear-gradient(135deg, #8BA888 0%, #6B8A6B 100%);
            color: white;
            border: none;
        }
        
        .text-wood {
            color: #5A3E2B;
        }
        
        .bg-sage {
            background: linear-gradient(135deg, #8BA888 0%, #6B8A6B 100%);
        }
        
        .content-area {
            background-color: #f8f9fa;
            min-height: calc(100vh - 70px);
        }
        
        .badge.bg-warning {
            background-color: #FFC107 !important;
            color: #5A3E2B !important;
        }
        
        .table th {
            background: linear-gradient(135deg, #8BA888 0%, #6B8A6B 100%);
            color: white;
        }
    </style>
    
    <script>
        let cart = [];
        
        // ==================== LOAD & SAVE ====================
        document.addEventListener('DOMContentLoaded', function() {
            loadCart();
            updateCartDisplay();
            updateCartCount();
            
            // Jika ada parameter ordered, kosongkan keranjang
            const urlParams = new URLSearchParams(window.location.search);
            if (urlParams.has('ordered')) {
                clearCartAfterOrder();
            }
        });
        
        function saveCart() {
            localStorage.setItem('customerCart', JSON.stringify(cart));
        }
        
        function loadCart() {
            const savedCart = localStorage.getItem('customerCart');
            if (savedCart) {
                cart = JSON.parse(savedCart);
            }
        }
        
        // Fungsi untuk mengosongkan keranjang setelah pesanan berhasil
        function clearCartAfterOrder() {
            // Kosongkan keranjang
            cart = [];
            saveCart();
            updateCartDisplay();
            updateCartCount();
            
            // Tampilkan notifikasi bahwa keranjang sudah dikosongkan
            setTimeout(function() {
                showToast('Pesanan berhasil! Keranjang telah dikosongkan.', false);
            }, 1000);
        }
        
        // ==================== CART FUNCTIONS ====================
        function addPromoToCart(button) {
            const id = parseInt(button.getAttribute('data-id'));
            const name = button.getAttribute('data-name');
            const price = parseInt(button.getAttribute('data-price'));
            addToCart(id, name, price);
        }
        
        function addToCart(id, name, price) {
            const existingItem = cart.find(function(item) {
                return item.id === id;
            });
            
            if (existingItem) {
                existingItem.quantity++;
            } else {
                cart.push({
                    id: id,
                    name: name,
                    price: price,
                    quantity: 1
                });
            }
            
            saveCart();
            updateCartDisplay();
            updateCartCount();
            showToast(name + ' ditambahkan ke keranjang!', false);
        }
        
        function updateQuantity(id, change) {
            const item = cart.find(function(item) {
                return item.id === id;
            });
            
            if (item) {
                item.quantity += change;
                if (item.quantity <= 0) {
                    cart = cart.filter(function(item) {
                        return item.id !== id;
                    });
                }
                saveCart();
                updateCartDisplay();
                updateCartCount();
            }
        }
        
        function removeFromCart(id) {
            cart = cart.filter(function(item) {
                return item.id !== id;
            });
            saveCart();
            updateCartDisplay();
            updateCartCount();
            showToast('Item dihapus dari keranjang', false);
        }
        
        // ==================== UPDATE DISPLAY ====================
        function updateCartCount() {
            let totalItems = 0;
            for (let i = 0; i < cart.length; i++) {
                totalItems += cart[i].quantity;
            }
            
            const cartCountElement = document.getElementById('cartCount');
            if (cartCountElement) {
                cartCountElement.textContent = totalItems;
                cartCountElement.style.display = totalItems > 0 ? 'inline-block' : 'none';
            }
        }
        
        function updateCartDisplay() {
            const cartItems = document.getElementById('cartItems');
            const cartFooter = document.getElementById('cartFooter');
            
            if (cart.length === 0) {
                cartItems.innerHTML = '<tr><td colspan="5" class="text-center py-4 text-muted">' +
                    '<i class="fas fa-shopping-cart fa-2x mb-2 opacity-50"></i>' +
                    '<p class="mb-0">Keranjang masih kosong</p>' +
                    '</td>' +
                    '</tr>';
                cartFooter.style.display = 'none';
                return;
            }
            
            let total = 0;
            let html = '';
            
            for (let i = 0; i < cart.length; i++) {
                const item = cart[i];
                const subtotal = item.price * item.quantity;
                total += subtotal;
                
                html += '<tr>' +
                    '<td><strong>' + escapeHtml(item.name) + '</strong></td>' +
                    '<td>Rp ' + formatNumber(item.price) + '</td>' +
                    '<td>' +
                    '<div class="d-flex align-items-center gap-2">' +
                    '<button class="btn btn-sm btn-outline-secondary" onclick="updateQuantity(' + item.id + ', -1)">-</button>' +
                    '<span style="min-width: 30px; text-align: center;">' + item.quantity + '</span>' +
                    '<button class="btn btn-sm btn-outline-secondary" onclick="updateQuantity(' + item.id + ', 1)">+</button>' +
                    '</div>' +
                    '</td>' +
                    '<td>Rp ' + formatNumber(subtotal) + '</td>' +
                    '<td><button class="btn btn-sm btn-danger" onclick="removeFromCart(' + item.id + ')"><i class="fas fa-trash"></i></button></td>' +
                    '</tr>';
            }
            
            cartItems.innerHTML = html;
            document.getElementById('cartTotal').innerHTML = 'Rp ' + formatNumber(total);
            cartFooter.style.display = '';
        }
        
        function viewCart() {
            updateCartDisplay();
        }
        
        // ==================== CHECKOUT ====================
        function proceedToCheckout() {
            if (cart.length === 0) {
                showToast('Keranjang masih kosong!', true);
                return;
            }
            
            let total = 0;
            let summaryHtml = '';
            
            for (let i = 0; i < cart.length; i++) {
                const item = cart[i];
                const subtotal = item.price * item.quantity;
                total += subtotal;
                summaryHtml += '<div class="d-flex justify-content-between mb-2">' +
                    '<span>' + escapeHtml(item.name) + ' x ' + item.quantity + '</span>' +
                    '<span class="text-muted">Rp ' + formatNumber(subtotal) + '</span>' +
                    '</div>';
            }
            
            document.getElementById('orderSummary').innerHTML = summaryHtml;
            document.getElementById('orderTotal').innerHTML = 'Rp ' + formatNumber(total);
            document.getElementById('cartDataInput').value = JSON.stringify(cart);
            
            // Close cart modal and open checkout modal
            const cartModal = bootstrap.Modal.getInstance(document.getElementById('cartModal'));
            if (cartModal) {
                cartModal.hide();
            }
            
            const checkoutModal = new bootstrap.Modal(document.getElementById('checkoutModal'));
            checkoutModal.show();
        }
        
        // Fungsi baru untuk validasi dan submit dengan clear cart
        function validateAndSubmit() {
            const customerName = document.getElementById('customerName').value;
            const tableNumber = document.getElementById('tableNumber').value;
            
            if (!customerName || customerName.trim() === '') {
                showToast('Nama lengkap harus diisi!', true);
                return false;
            }
            
            if (!tableNumber || tableNumber < 1) {
                showToast('Nomor meja harus diisi!', true);
                return false;
            }
            
            // Simpan data keranjang sebelum submit
            const cartData = JSON.stringify(cart);
            document.getElementById('cartDataInput').value = cartData;
            
            // Clear cart setelah submit
            setTimeout(function() {
                cart = [];
                saveCart();
                updateCartDisplay();
                updateCartCount();
            }, 100);
            
            return true;
        }
        
        // ==================== HELPER FUNCTIONS ====================
        function formatNumber(num) {
            return num.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ".");
        }
        
        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }
        
        function showToast(message, isError) {
            const toast = document.getElementById('successToast');
            if (toast) {
                const toastBody = toast.querySelector('.toast-body');
                if (toastBody) {
                    toastBody.textContent = message;
                }
                toast.classList.remove('bg-success', 'bg-danger');
                toast.classList.add(isError ? 'bg-danger' : 'bg-success');
                const bsToast = new bootstrap.Toast(toast);
                bsToast.show();
                setTimeout(function() {
                    bsToast.hide();
                }, 3000);
            } else {
                alert(message);
            }
        }
        
        // Fungsi untuk manual clear cart (bisa dipanggil dari mana saja)
        function clearCart() {
            cart = [];
            saveCart();
            updateCartDisplay();
            updateCartCount();
            showToast('Keranjang telah dikosongkan', false);
        }
        
        // Event listener untuk mendeteksi perubahan URL (ketika kembali dari submit)
        window.addEventListener('pageshow', function(event) {
            if (event.persisted || performance.getEntriesByType('navigation')[0].type === 'back_forward') {
                // Halaman di-load dari cache (termasuk setelah submit)
                const urlParams = new URLSearchParams(window.location.search);
                if (urlParams.has('ordered')) {
                    clearCartAfterOrder();
                }
            }
        });
    </script>
</body>
</html>
