<!DOCTYPE html>
<html lang="id" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{base :: head(title='Menu KL IT del')}"></head>

<body>

    <!-- Toast -->
    <div th:replace="~{base :: toast}"></div>

    <!-- Navbar -->
    <div th:replace="~{base :: navbar}"></div>

    <div class="d-flex" style="margin-top: 70px;">

        <!-- Sidebar -->
        <div th:replace="~{base :: sidebar}"></div>

        <!-- Content -->
        <div class="content-area flex-grow-1 p-4">

            <!-- Header -->
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h2 class="text-wood">
                    <i class="fas fa-utensils me-2"></i>
                    Menu KL IT del
                </h2>

                <!-- Cart Button -->
                <a href="/cart" class="btn btn-sage">
                    <i class="fas fa-shopping-cart me-1"></i>
                    Keranjang
                    <span id="cartCount" class="badge bg-danger ms-1 rounded-pill" style="display: none;">0</span>
                </a>
            </div>

            <!-- Alert Messages -->
            <div th:if="${param.ordered != null}"
                 class="alert alert-success alert-dismissible fade show"
                 role="alert"
                 id="successAlert">
                <i class="fas fa-check-circle me-2"></i>
                Pesanan berhasil dikirim! Silakan tunggu konfirmasi dari admin.
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>

            <!-- Category Tabs -->
            <div class="category-tabs-wrapper mb-4">
                <div class="category-tabs">
                    <button class="category-tab active" data-category="all" onclick="filterMenuByCategory('all')">
                        <i class="fas fa-th-large me-2"></i> Semua Menu
                    </button>
                    <button class="category-tab" data-category="makanan" onclick="filterMenuByCategory('makanan')">
                        <i class="fas fa-utensils me-2"></i> Makanan
                        <span class="category-count" id="countMakanan">0</span>
                    </button>
                    <button class="category-tab" data-category="minuman" onclick="filterMenuByCategory('minuman')">
                        <i class="fas fa-coffee me-2"></i> Minuman
                        <span class="category-count" id="countMinuman">0</span>
                    </button>
                    <button class="category-tab" data-category="snack" onclick="filterMenuByCategory('snack')">
                        <i class="fas fa-cookie-bite me-2"></i> Snack
                        <span class="category-count" id="countSnack">0</span>
                    </button>
                </div>
            </div>

            <!-- Menu Grid -->
            <div class="row" id="menuContainer">
                <div class="col-lg-3 col-md-4 col-sm-6 mb-4"
                     th:each="menu : ${menus}"
                     th:if="${menu.available}"
                     th:attr="data-category=${menu.category}">

                    <div class="card h-100 shadow-sm border-0">
                        <div class="position-relative overflow-hidden">
                            <!-- Image dengan trigger modal -->
                            <img th:src="${menu.image != null ? menu.image : '/images/default-menu.jpg'}"
                                 class="card-img-top menu-image-sync clickable-image"
                                 alt="Menu"
                                 th:attr="onclick=|showMenuDetail('${menu.name}', '${menu.image}', '${menu.description}')|"
                                 onerror="this.src='/images/default-menu.jpg'" />
                            
                            <div class="badge-overlay">
                                <span class="badge-custom best-seller" th:if="${menu.badge == 'best-seller'}">
                                    <i class="fas fa-star"></i> Best Seller
                                </span>
                                <span class="badge-custom new" th:if="${menu.badge == 'new'}">
                                    <i class="fas fa-sparkles"></i> Baru
                                </span>
                            </div>
                        </div>

                        <div class="card-body d-flex flex-column p-3">
                            <h6 class="card-title fw-bold mb-1" th:text="${menu.name}"></h6>
                            <p class="card-text text-muted small flex-grow-1 mb-2" th:text="${menu.description}"></p>

                            <div class="d-flex justify-content-between align-items-center mt-2 pt-2 border-top">
                                <div class="price-container">
                                    <span class="price-label">Harga</span>
                                    <span class="price-value">
                                        Rp <span th:text="${#numbers.formatInteger(menu.price, 0, 'COMMA')}"></span>
                                    </span>
                                </div>
                                
                                <button type="button"
                                        class="btn-add-cart"
                                        th:attr="data-id=${menu.id}, data-name=${menu.name}, data-price=${menu.price}, data-image=${menu.image}"
                                        onclick="addToCart(this)">
                                    <i class="fas fa-cart-plus"></i>
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal Detail Menu -->
    <div class="modal fade" id="menuDetailModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0" style="border-radius: 20px;">
                <div class="modal-header border-0">
                    <h5 class="modal-title fw-bold text-wood" id="detailMenuName"></h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body p-0 text-center">
                    <img id="detailMenuImage" src="" class="img-fluid w-100" style="max-height: 400px; object-fit: contain; background: #f8f9fa;">
                    <div class="p-4 text-start">
                        <h6 class="fw-bold">Deskripsi:</h6>
                        <p id="detailMenuDescription" class="text-muted"></p>
                    </div>
                </div>
                <div class="modal-footer border-0">
                    <button type="button" class="btn btn-secondary rounded-pill" data-bs-dismiss="modal">Tutup</button>
                </div>
            </div>
        </div>
    </div>

    <div th:replace="~{base :: scripts}"></div>

    <style>
        .menu-image-sync {
            height: 180px;
            width: 100%;
            object-fit: cover;
            transition: transform 0.5s ease;
        }

        /* Pointer saat diarahkan ke gambar */
        .clickable-image {
            cursor: pointer;
        }

        .clickable-image:hover {
            opacity: 0.9;
        }

        .card:hover .menu-image-sync {
            transform: scale(1.1);
        }

        .card {
            border-radius: 15px;
            overflow: hidden;
            transition: all 0.3s ease;
            background: white;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.1) !important;
        }

        /* Kategori & Style Lainnya */
        .category-tabs-wrapper { background: white; border-radius: 16px; padding: 5px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
        .category-tabs { display: flex; gap: 10px; overflow-x: auto; padding: 5px; scrollbar-width: none; }
        .category-tab { flex: 1; min-width: 140px; padding: 10px 15px; border: none; background: #f8f9fa; border-radius: 12px; font-weight: 600; color: #6c757d; transition: all 0.3s ease; white-space: nowrap; }
        .category-tab.active { background: linear-gradient(135deg, #8BA888 0%, #6B8A6B 100%); color: white; box-shadow: 0 4px 15px rgba(107,138,107,0.3); }
        
        .badge-overlay { position: absolute; top: 10px; right: 10px; z-index: 2; }
        .badge-custom { padding: 4px 10px; border-radius: 20px; font-size: 10px; font-weight: bold; color: white; }
        .badge-custom.best-seller { background: linear-gradient(135deg, #f39c12 0%, #e67e22 100%); }
        .badge-custom.new { background: linear-gradient(135deg, #3498db 0%, #2980b9 100%); }

        .price-value { font-weight: bold; color: #6B8A6B; font-size: 15px; }
        .btn-add-cart { width: 35px; height: 35px; border-radius: 50%; border: none; background: #6B8A6B; color: white; display: flex; align-items: center; justify-content: center; transition: all 0.3s; }
        .btn-add-cart:hover { background: #5A3E2B; transform: rotate(15deg); }
        .btn-sage { background: #6B8A6B; color: white; border: none; }
        .text-wood { color: #5A3E2B; }
        .content-area { background-color: #f8f9fa; min-height: 100vh; }
    </style>

    <script>
        let cart = [];

        document.addEventListener('DOMContentLoaded', function() {
            loadCart();
            updateCartCount();
            updateCategoryCounts();
        });

        // Fungsi untuk menampilkan detail di modal
        function showMenuDetail(name, image, description) {
            document.getElementById('detailMenuName').textContent = name;
            document.getElementById('detailMenuImage').src = image || '/images/default-menu.jpg';
            document.getElementById('detailMenuDescription').textContent = description || 'Tidak ada deskripsi.';
            
            const detailModal = new bootstrap.Modal(document.getElementById('menuDetailModal'));
            detailModal.show();
        }

        function saveCart() { localStorage.setItem('customerCart', JSON.stringify(cart)); }

        function loadCart() {
            const savedCart = localStorage.getItem('customerCart');
            if (savedCart) cart = JSON.parse(savedCart);
        }

        function updateCartCount() {
            let totalItems = 0;
            cart.forEach(item => totalItems += item.quantity);
            const el = document.getElementById('cartCount');
            if (el) {
                el.textContent = totalItems;
                el.style.display = totalItems > 0 ? 'inline-block' : 'none';
            }
        }

        function updateCategoryCounts() {
            const cards = document.querySelectorAll('#menuContainer > div');
            let counts = { makanan: 0, minuman: 0, snack: 0 };
            cards.forEach(card => {
                const category = card.getAttribute('data-category');
                if (counts[category] !== undefined) counts[category]++;
            });
            document.getElementById('countMakanan').textContent = counts.makanan;
            document.getElementById('countMinuman').textContent = counts.minuman;
            document.getElementById('countSnack').textContent = counts.snack;
        }

        function filterMenuByCategory(category) {
            document.querySelectorAll('.category-tab').forEach(tab => {
                tab.classList.toggle('active', tab.getAttribute('data-category') === category);
            });
            document.querySelectorAll('#menuContainer > div').forEach(card => {
                const cardCategory = card.getAttribute('data-category');
                card.style.display = (category === 'all' || cardCategory === category) ? 'block' : 'none';
            });
        }

        function addToCart(button) {
            const id = parseInt(button.getAttribute('data-id'));
            const name = button.getAttribute('data-name');
            const price = parseInt(button.getAttribute('data-price'));
            const imageUrl = button.getAttribute('data-image') || '/images/default-menu.jpg';
            
            const existingItem = cart.find(item => item.id === id);
            if (existingItem) {
                existingItem.quantity++;
            } else {
                cart.push({ id, name, price, quantity: 1, imageUrl });
            }
            saveCart();
            updateCartCount();
            showToast(name + ' ditambahkan ke keranjang!', false);
        }

        function showToast(message, isError) {
            const toast = document.getElementById('successToast');
            if (toast) {
                const toastBody = toast.querySelector('.toast-body');
                if (toastBody) toastBody.textContent = message;
                toast.classList.remove('bg-success', 'bg-danger');
                toast.classList.add(isError ? 'bg-danger' : 'bg-success');
                new bootstrap.Toast(toast).show();
            }
        }
    </script>
</body>
</html>
