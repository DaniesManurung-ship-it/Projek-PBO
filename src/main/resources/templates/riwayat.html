<!DOCTYPE html>
<html lang="id" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{base :: head(title='Riwayat Pesanan')}"></head>

<body>
    <!-- Toast -->
    <div th:replace="~{base :: toast}"></div>

    <!-- Navbar -->
    <div th:replace="~{base :: navbar}"></div>

    <div class="d-flex" style="margin-top: 70px;">
        <!-- Sidebar -->
        <div th:replace="~{base :: sidebar}"></div>

        <!-- Content Area -->
        <div class="content-area flex-grow-1 p-4">
            <!-- Header -->
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h2 class="text-wood">
                    <i class="fas fa-receipt me-2"></i>
                    Riwayat Pesanan Saya
                </h2>
                <a href="/menu" class="btn btn-sage rounded-pill">
                    <i class="fas fa-plus me-1"></i> Pesan Lagi
                </a>
            </div>

            <!-- Alert Messages -->
            <div th:if="${success}" class="alert alert-success alert-dismissible fade show border-0 shadow-sm rounded-4" role="alert">
                <i class="fas fa-check-circle me-2"></i> <span th:text="${success}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>

            <!-- Status Filter Tabs (Disamakan dengan Menu) -->
            <div class="category-tabs-wrapper mb-4">
                <div class="category-tabs">
                    <button class="category-tab active" data-status="all" onclick="filterByStatus('all')">Semua</button>
                    <button class="category-tab" data-status="pending" onclick="filterByStatus('pending')">⏳ Menunggu</button>
                    <button class="category-tab" data-status="confirmed" onclick="filterByStatus('confirmed')">✅ Proses</button>
                    <button class="category-tab" data-status="completed" onclick="filterByStatus('completed')">🎉 Selesai</button>
                    <button class="category-tab" data-status="cancelled" onclick="filterByStatus('cancelled')">❌ Batal</button>
                </div>
            </div>

            <!-- Order Cards Grid -->
            <div th:if="${not #lists.isEmpty(pesanans)}" class="row" id="pesananContainer">
                <div class="col-md-6 mb-4" th:each="pesanan : ${pesanans}" th:attr="data-status=${pesanan.status}">
                    <div class="card h-100 shadow-sm border-0 order-card">
                        <!-- Card Status Accent -->
                        <div class="status-accent" th:classappend="${pesanan.status}"></div>
                        
                        <div class="card-body p-4">
                            <div class="d-flex justify-content-between align-items-start mb-3">
                                <div>
                                    <h6 class="fw-bold mb-0">Pesanan #<span th:text="${pesanan.id}"></span></h6>
                                    <small class="text-muted">
                                        <i class="far fa-calendar-alt me-1"></i>
                                        <span th:text="${#temporals.format(pesanan.createdAt, 'dd MMM yyyy, HH:mm')}"></span>
                                    </small>
                                </div>
                                <span class="badge-status" th:classappend="${pesanan.status}">
                                    <span th:if="${pesanan.status == 'pending'}">Menunggu</span>
                                    <span th:if="${pesanan.status == 'confirmed'}">Diproses</span>
                                    <span th:if="${pesanan.status == 'completed'}">Selesai</span>
                                    <span th:if="${pesanan.status == 'cancelled'}">Dibatalkan</span>
                                </span>
                            </div>

                            <!-- Items Preview -->
                            <div class="items-preview-box mb-3" th:id="'items-' + ${pesanan.id}">
                                <div class="text-center py-2"><small class="text-muted">Memuat item...</small></div>
                            </div>

                            <div class="d-flex justify-content-between align-items-center mt-3 pt-3 border-top">
                                <div>
                                    <small class="text-muted d-block" style="font-size: 10px; text-transform: uppercase;">Total Pembayaran</small>
                                    <span class="price-value">Rp <span th:text="${#numbers.formatInteger(pesanan.totalPrice, 0, 'COMMA')}"></span></span>
                                </div>
                                <div class="d-flex gap-2">
                                    <button class="btn btn-sm btn-light rounded-pill px-3" th:onclick="'showDetail(' + ${pesanan.id} + ')'">
                                        <i class="fas fa-eye"></i> Detail
                                    </button>
                                    <a th:if="${pesanan.status == 'pending'}" th:href="@{/pesanan/batal/{id}(id=${pesanan.id})}" 
                                       class="btn btn-sm btn-outline-danger rounded-pill px-3" 
                                       onclick="return confirm('Yakin ingin membatalkan pesanan ini?')">
                                        Batal
                                    </a>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Empty State -->
            <div th:if="${#lists.isEmpty(pesanans)}" class="text-center py-5">
                <div class="empty-icon-box mb-3">
                    <i class="fas fa-receipt fa-3x text-muted"></i>
                </div>
                <h5 class="text-wood fw-bold">Belum Ada Pesanan</h5>
                <p class="text-muted small">Yuk, mulai jelajahi menu lezat KL IT del sekarang!</p>
                <a href="/menu" class="btn btn-sage rounded-pill px-4">Pesan Sekarang</a>
            </div>
        </div>
    </div>

    <!-- Modal Detail (Style Konsisten) -->
    <div class="modal fade" id="detailModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0 rounded-4">
                <div class="modal-header border-0 pb-0">
                    <h5 class="modal-title fw-bold text-wood">Detail Transaksi</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body" id="detailContent">
                    <!-- Content Loaded by JS -->
                </div>
                <div class="modal-footer border-0">
                    <button type="button" class="btn btn-light rounded-pill" data-bs-dismiss="modal">Tutup</button>
                </div>
            </div>
        </div>
    </div>

    <div th:replace="~{base :: scripts}"></div>

    <style>
        /* Desain Tab Filter */
        .category-tabs-wrapper { background: white; border-radius: 16px; padding: 5px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
        .category-tabs { display: flex; gap: 8px; overflow-x: auto; padding: 5px; scrollbar-width: none; }
        .category-tab { flex: 1; min-width: 110px; padding: 10px; border: none; background: #f8f9fa; border-radius: 12px; font-weight: 600; color: #6c757d; transition: 0.3s; font-size: 13px; }
        .category-tab.active { background: linear-gradient(135deg, #8BA888 0%, #6B8A6B 100%); color: white; box-shadow: 0 4px 12px rgba(107,138,107,0.3); }

        /* Order Card Style */
        .order-card {
            border-radius: 20px;
            overflow: hidden;
            transition: 0.3s;
            position: relative;
        }
        .order-card:hover { transform: translateY(-5px); box-shadow: 0 12px 25px rgba(0,0,0,0.1) !important; }
        
        .status-accent { height: 4px; width: 100%; }
        .status-accent.pending { background: #f1c40f; }
        .status-accent.confirmed { background: #3498db; }
        .status-accent.completed { background: #8BA888; }
        .status-accent.cancelled { background: #e74c3c; }

        .badge-status { font-size: 11px; padding: 4px 12px; border-radius: 20px; font-weight: bold; }
        .badge-status.pending { background: #fef9e7; color: #f1c40f; }
        .badge-status.confirmed { background: #ebf5fb; color: #3498db; }
        .badge-status.completed { background: #f4f9f4; color: #6B8A6B; }
        .badge-status.cancelled { background: #fdedec; color: #e74c3c; }

        .items-preview-box { background: #f8f9fa; border-radius: 12px; padding: 12px; }
        .price-value { font-weight: bold; color: #6B8A6B; font-size: 18px; }

        .empty-icon-box { width: 80px; height: 80px; background: #f8f9fa; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto; }
        
        .text-wood { color: #5A3E2B; }
        .btn-sage { background: linear-gradient(135deg, #8BA888 0%, #6B8A6B 100%); color: white; border: none; transition: 0.3s; }
        .btn-sage:hover { transform: translateY(-2px); box-shadow: 0 4px 12px rgba(107,138,107,0.3); color: white; }
        .content-area { background-color: #f8f9fa; min-height: 100vh; }
    </style>

    <script th:inline="javascript">
        document.addEventListener('DOMContentLoaded', function() {
            loadAllItems();
        });

        function loadAllItems() {
            const containers = document.querySelectorAll('[id^="items-"]');
            containers.forEach(container => {
                const id = container.id.replace('items-', '');
                loadOrderItems(id);
            });
        }

        function loadOrderItems(orderId) {
            fetch('/pesanan/detail/' + orderId)
                .then(res => res.json())
                .then(data => {
                    const container = document.getElementById('items-' + orderId);
                    if (data.items) {
                        const items = JSON.parse(data.items);
                        let html = '<div style="font-size: 12px;">';
                        items.slice(0, 2).forEach(item => {
                            html += `<div class="d-flex justify-content-between mb-1">
                                        <span>${item.name} x${item.quantity}</span>
                                        <span class="text-muted">Rp ${formatNumber(item.price * item.quantity)}</span>
                                     </div>`;
                        });
                        if (items.length > 2) {
                            html += `<div class="text-center text-muted mt-1" style="font-size: 10px;">+ ${items.length - 2} item lainnya</div>`;
                        }
                        html += '</div>';
                        container.innerHTML = html;
                    }
                }).catch(() => {
                    document.getElementById('items-' + orderId).innerHTML = '<small class="text-danger">Gagal memuat</small>';
                });
        }

        function filterByStatus(status) {
            document.querySelectorAll('.category-tab').forEach(tab => {
                tab.classList.toggle('active', tab.getAttribute('data-status') === status);
            });
            
            document.querySelectorAll('#pesananContainer > div').forEach(card => {
                const cardStatus = card.getAttribute('data-status');
                card.style.display = (status === 'all' || cardStatus === status) ? 'block' : 'none';
            });
        }

        function showDetail(id) {
            const modal = new bootstrap.Modal(document.getElementById('detailModal'));
            const contentDiv = document.getElementById('detailContent');
            contentDiv.innerHTML = '<div class="text-center py-4"><div class="spinner-border text-success"></div></div>';
            modal.show();

            fetch('/pesanan/detail/' + id)
                .then(res => res.json())
                .then(data => {
                    const items = JSON.parse(data.items);
                    let itemsHtml = '';
                    items.forEach(item => {
                        itemsHtml += `<div class="d-flex justify-content-between mb-2">
                            <div><span class="fw-bold">${item.name}</span><br><small>${item.quantity} x Rp ${formatNumber(item.price)}</small></div>
                            <div class="fw-bold">Rp ${formatNumber(item.price * item.quantity)}</div>
                        </div>`;
                    });

                    contentDiv.innerHTML = `
                        <div class="p-2">
                            <div class="row mb-3 bg-light p-3 rounded-4">
                                <div class="col-6"><small class="text-muted">ID Pesanan</small><br>#${data.id}</div>
                                <div class="col-6"><small class="text-muted">Status</small><br><span class="fw-bold text-success">${data.status.toUpperCase()}</span></div>
                            </div>
                            <h6 class="fw-bold mb-3">Rincian Item</h6>
                            <div class="border-bottom pb-2 mb-3">${itemsHtml}</div>
                            <div class="d-flex justify-content-between mb-4">
                                <h5 class="fw-bold">Total</h5>
                                <h5 class="fw-bold text-success">Rp ${formatNumber(data.totalPrice)}</h5>
                            </div>
                            ${data.notes ? `<div class="alert alert-warning border-0 small"><strong>Catatan:</strong> ${data.notes}</div>` : ''}
                        </div>
                    `;
                });
        }

        function formatNumber(num) {
            return num.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ".");
        }
    </script>
</body>

</html>
