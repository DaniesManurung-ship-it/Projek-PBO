<!DOCTYPE html>
<html lang="id" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{base :: head(title='Notifikasi')}"></head>
<body>
    <div th:replace="~{base :: toast}"></div>
    <div th:replace="~{base :: navbar}"></div>
    
    <div class="d-flex" style="margin-top: 70px;">
        <div th:replace="~{base :: sidebar}"></div>
        
        <div class="content-area flex-grow-1 p-4">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h2 class="text-wood"><i class="fas fa-bell me-2"></i>Notifikasi</h2>
                <button class="btn btn-sm btn-sage" onclick="markAllAsRead()">
                    <i class="fas fa-check-double me-1"></i> Tandai semua dibaca
                </button>
            </div>
            
            <div class="card shadow-sm border-0">
                <div class="card-body">
                    <div th:each="notif : ${notifications}" class="border-bottom pb-3 mb-3">
                        <div class="d-flex justify-content-between align-items-start">
                            <div>
                                <strong th:text="${notif.title}"></strong>
                                <p class="mb-0 text-muted small" th:text="${notif.message}"></p>
                                <small class="text-muted" th:text="${#temporals.format(notif.createdAt, 'dd MMM yyyy HH:mm')}"></small>
                            </div>
                            <div th:if="${!notif.read}" class="bg-danger rounded-circle" style="width: 10px; height: 10px;"></div>
                        </div>
                    </div>
                    <div th:if="${#lists.isEmpty(notifications)}" class="text-center py-5">
                        <i class="fas fa-bell-slash fa-4x text-muted mb-3 opacity-50"></i>
                        <p class="text-muted">Belum ada notifikasi</p>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <div th:replace="~{base :: scripts}"></div>
    
    <script>
        function markAllAsRead() {
            fetch('/api/notifikasi/mark-read', { method: 'POST' })
                .then(function(response) {
                    if (response.ok) {
                        location.reload();
                    }
                });
        }
    </script>
</body>
</html>
