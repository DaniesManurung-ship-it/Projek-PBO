        .bg-sage {

        /* Sidebar Umum - Style yang sama untuk customer dan admin */
        .sidebar-customer, .sidebar-admin {
            min-height: calc(100vh - 70px);
            background: linear-gradient(180deg, var(--wood) 0%, #5a3a28 100%);
            width: 280px;
            transition: all 0.3s;
        }
        
        .sidebar-customer .nav-link, .sidebar-admin .nav-link {
            color: rgba(255,255,255,0.85);
            padding: 12px 24px;
            transition: all 0.3s ease;
            border-radius: 12px;
            margin: 4px 12px;
        }
        
        .sidebar-customer .nav-link:hover, .sidebar-admin .nav-link:hover {
            background: rgba(139, 168, 136, 0.3);
            color: white;
            padding-left: 32px;
        }
        
        .sidebar-customer .nav-link.active, .sidebar-admin .nav-link.active {
            background: linear-gradient(135deg, var(--sage) 0%, var(--sage-dark) 100%);
            color: white;
        }
        
        .sidebar-customer .nav-link i, .sidebar-admin .nav-link i {
            width: 28px;
            margin-right: 10px;
        }
        
        .sidebar-customer .sidebar-header, .sidebar-admin .sidebar-header {
            text-align: center;
            padding: 20px 0;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            margin-bottom: 10px;
        }
        
        .sidebar-customer .sidebar-header i, .sidebar-admin .sidebar-header i {
            font-size: 48px;
            color: white;
            margin-bottom: 10px;
        }
        
        .sidebar-customer .sidebar-header h6, .sidebar-admin .sidebar-header h6 {
            color: white;
            margin: 0;
            font-size: 14px;
            opacity: 0.8;
        }
        
        .content-area {
            background: var(--cream);
            min-height: calc(100vh - 70px);
        }
        
        .table th {
            background: linear-gradient(135deg, var(--sage) 0%, var(--sage-dark) 100%);
            color: white;
        }
        
        .price {
            color: var(--accent);
            font-weight: bold;
        }
        
        .mobile-toggle {
            display: none;
        }
        
        /* Card styles */
        .card {
            border-radius: 16px;
            overflow: hidden;
            transition: transform 0.3s, box-shadow 0.3s;
        }
        
        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }
        
        /* Button styles */

            border-radius: 8px;
            padding: 6px 12px;
            font-size: 12px;
        }
        
        /* Alert styles */
        .alert {
            border-radius: 12px;
            border: none;
        }
        
        @media (max-width: 768px) {
            .sidebar-customer, .sidebar-admin {
                position: fixed;
                left: -280px;
                transition: all 0.3s;
                z-index: 1050;
                width: 280px;
            }
            .sidebar-customer.show, .sidebar-admin.show {
                left: 0;
            }
            .mobile-toggle {
                display: block;
            }

<!-- SCRIPTS -->
<div th:fragment="scripts">
    <script>
        // Function to initialize sidebar toggle for both customer and admin
        function initSidebarToggle() {
            const toggleBtn = document.getElementById('sidebarToggle');
            const sidebar = document.getElementById('sidebar');
            
            if (toggleBtn && sidebar) {
                // Remove existing listeners to avoid duplicates
                const newToggleBtn = toggleBtn.cloneNode(true);
                toggleBtn.parentNode.replaceChild(newToggleBtn, toggleBtn);
                
                newToggleBtn.addEventListener('click', function(e) {
                    e.preventDefault();
                    e.stopPropagation();
                    sidebar.classList.toggle('show');
                });
            }
        }
        
        // Close sidebar when clicking outside on mobile
        document.addEventListener('click', function(event) {
            const sidebar = document.getElementById('sidebar');
            const toggleBtn = document.getElementById('sidebarToggle');
            
            if (window.innerWidth <= 768 && sidebar && sidebar.classList.contains('show')) {
                if (toggleBtn && !toggleBtn.contains(event.target) && !sidebar.contains(event.target)) {
                    sidebar.classList.remove('show');
                }
            }
        });
        
        // Initialize when DOM is ready
        document.addEventListener('DOMContentLoaded', function() {
            initSidebarToggle();
        });
        
        // Re-initialize after any AJAX content load (for modals, etc.)
        document.addEventListener('shown.bs.modal', function() {
            initSidebarToggle();
        });
        
        function showToast(message, isError) {
            const toast = document.getElementById('successToast');
            if (toast) {
                toast.querySelector('.toast-body').textContent = message;
                toast.classList.remove('bg-success', 'bg-danger');
                toast.classList.add(isError ? 'bg-danger' : 'bg-success');
                new bootstrap.Toast(toast).show();
            }
        }
    </script>
</div>

<!-- TOAST -->

        <div id="successToast" class="toast align-items-center text-white bg-success border-0" role="alert">
            <div class="d-flex">
                <div class="toast-body"></div>
                <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
            </div>
