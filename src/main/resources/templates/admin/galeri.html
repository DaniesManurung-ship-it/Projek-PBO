<!DOCTYPE html>
<html lang="id" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{base :: head(title='Kelola Galeri - Admin')}"></head>
<body>
    <div th:replace="~{base :: toast}"></div>
    <div th:replace="~{base :: navbar}"></div>
    
    <div class="d-flex" style="margin-top: 70px;">
        <div th:replace="~{base :: adminSidebar}"></div>

            <!-- Main Content -->
        <div class="content-area flex-grow-1 p-4">
                <div class="card shadow-sm border-0">
                    <div class="card-header" style="background: linear-gradient(135deg, #8BA888 0%, #6B8A6B 100%); color: white;">
                        <div class="d-flex justify-content-between align-items-center">
                            <h5 class="mb-0"><i class="fas fa-images me-2"></i>Kelola Galeri</h5>
                            <button class="btn btn-light btn-sm" data-bs-toggle="modal" data-bs-target="#addGaleriModal">
                                <i class="fas fa-plus me-1"></i>Tambah Foto
                            </button>
                        </div>
                    </div>
                    <div class="card-body">
                        <!-- Alert Messages -->
                        <div th:if="${param.success != null}" class="alert alert-success alert-dismissible fade show" role="alert">
                            <i class="fas fa-check-circle me-2"></i>Galeri berhasil ditambahkan!
                            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                        </div>
                        <div th:if="${param.error != null}" class="alert alert-danger alert-dismissible fade show" role="alert">
                            <i class="fas fa-exclamation-circle me-2"></i>Gagal menambahkan galeri!
                            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                        </div>
                        <div th:if="${param.updated != null}" class="alert alert-success alert-dismissible fade show" role="alert">
                            <i class="fas fa-check-circle me-2"></i>Galeri berhasil diupdate!
                            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                        </div>
                        <div th:if="${param.deleted != null}" class="alert alert-success alert-dismissible fade show" role="alert">
                            <i class="fas fa-check-circle me-2"></i>Galeri berhasil dihapus!
                            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                        </div>
                        
                        <div class="row">
                            <div th:if="${not #lists.isEmpty(galeris)}" th:each="galeri : ${galeris}" class="col-md-4 mb-3">
                                <div class="card h-100">
                                    <img th:src="${galeri.image != null ? galeri.image : '/uploads/default.jpg'}" class="card-img-top" alt="Galeri" style="height: 180px; object-fit: cover;">
                                    <div class="card-body">
                                        <h6 class="card-title" th:text="${galeri.title}"></h6>
                                        <p class="card-text small text-muted" th:text="${galeri.description}"></p>
                                        <div class="d-flex justify-content-between">
                                            <button class="btn btn-sm btn-warning" th:onclick="'editGaleri(' + ${galeri.id} + ')'">
                                                <i class="fas fa-edit"></i>
                                            </button>
                                            <button class="btn btn-sm btn-danger" th:onclick="'deleteGaleri(' + ${galeri.id} + ')'">
                                                <i class="fas fa-trash"></i>
                                            </button>
                                        </div>
                                    </div>
                                </div>
                            </div>
                            <div th:if="${#lists.isEmpty(galeris)}" class="col-12">
                                <div class="text-center py-5">
                                    <i class="fas fa-images fa-3x text-muted mb-3 opacity-50"></i>
                                    <p class="text-muted">Belum ada foto di galeri</p>
                                    <button class="btn btn-sage btn-sm" data-bs-toggle="modal" data-bs-target="#addGaleriModal">
                                        <i class="fas fa-plus me-1"></i>Tambah Foto Pertama
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
        </div>
    </div>

    <!-- Add Galeri Modal -->
    <div class="modal fade" id="addGaleriModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header" style="background: linear-gradient(135deg, #8BA888 0%, #6B8A6B 100%); color: white;">
                    <h5 class="modal-title">Tambah Foto Galeri</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <form th:action="@{/admin/galeri/add}" method="post" enctype="multipart/form-data">
                    <div class="modal-body">
                        <div class="mb-3">
                            <label class="form-label">Judul <span class="text-danger">*</span></label>
                            <input type="text" class="form-control" name="title" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Deskripsi</label>
                            <textarea class="form-control" name="description" rows="3"></textarea>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Kategori</label>
                            <select class="form-control" name="category">
                                <option value="Event">Event</option>
                                <option value="Menu">Menu</option>
                                <option value="Interior">Interior</option>
                                <option value="Lainnya">Lainnya</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Foto <span class="text-danger">*</span></label>
                            <input type="file" class="form-control" name="image" accept="image/*" required>
                            <small class="text-muted">Format: JPG, PNG, JPEG (Max 2MB)</small>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Batal</button>
                        <button type="submit" class="btn btn-success">Simpan</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- Edit Modal -->
    <div class="modal fade" id="editGaleriModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header" style="background: linear-gradient(135deg, #8BA888 0%, #6B8A6B 100%); color: white;">
                    <h5 class="modal-title">Edit Foto Galeri</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <form th:action="@{/admin/galeri/update}" method="post" enctype="multipart/form-data">
                    <input type="hidden" name="id" id="editGaleriId">
                    <div class="modal-body">
                        <div class="mb-3">
                            <label class="form-label">Judul <span class="text-danger">*</span></label>
                            <input type="text" class="form-control" name="title" id="editGaleriTitle" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Deskripsi</label>
                            <textarea class="form-control" name="description" id="editGaleriDescription" rows="3"></textarea>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Kategori</label>
                            <select class="form-control" name="category" id="editGaleriCategory">
                                <option value="Event">Event</option>
                                <option value="Menu">Menu</option>
                                <option value="Interior">Interior</option>
                                <option value="Lainnya">Lainnya</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Foto (Kosongkan jika tidak ingin mengubah)</label>
                            <input type="file" class="form-control" name="image" accept="image/*" id="editGaleriImage">
                            <img id="editImagePreview" class="mt-2" style="height: 100px; object-fit: cover; display: none; border-radius: 8px;">
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Batal</button>
                        <button type="submit" class="btn btn-success">Update</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <div th:replace="~{base :: scripts}"></div>
    
    <style>
        /* Card Styles */
        .card {
            border-radius: 16px;
            overflow: hidden;
            transition: transform 0.3s, box-shadow 0.3s;
        }
        
        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }
        
        /* Button Styles */
        .btn-success, .btn-warning, .btn-danger {
            border-radius: 8px;
            padding: 6px 12px;
            font-size: 12px;
        }
    </style>
    
    <script>
        function editGaleri(id) {
            fetch('/admin/galeri/' + id)
                .then(function(response) { return response.json(); })
                .then(function(data) {
                    document.getElementById('editGaleriId').value = data.id;
                    document.getElementById('editGaleriTitle').value = data.title;
                    document.getElementById('editGaleriDescription').value = data.description || '';
                    document.getElementById('editGaleriCategory').value = data.category;
                    
                    var preview = document.getElementById('editImagePreview');
                    if (data.image && data.image !== '') {
                        preview.src = data.image;
                        preview.style.display = 'block';
                    } else {
                        preview.style.display = 'none';
                    }
                    
                    var modal = new bootstrap.Modal(document.getElementById('editGaleriModal'));
                    modal.show();
                })
                .catch(function(error) { console.error('Error:', error); });
        }
        
        function deleteGaleri(id) {
            if(confirm('Yakin ingin menghapus galeri ini? Tindakan ini tidak dapat dibatalkan!')) {
                window.location.href = '/admin/galeri/delete/' + id;
            }
        }
        
        // Preview image for edit modal
        var editImageInput = document.getElementById('editGaleriImage');
        if (editImageInput) {
            editImageInput.addEventListener('change', function(e) {
                var preview = document.getElementById('editImagePreview');
                if (e.target.files && e.target.files[0]) {
                    var reader = new FileReader();
                    reader.onload = function(e) {
                        preview.src = e.target.result;
                        preview.style.display = 'block';
                    };
                    reader.readAsDataURL(e.target.files[0]);
                } else {
                    preview.style.display = 'none';
                }
            });
        }
    </script>
</body>
</html>
