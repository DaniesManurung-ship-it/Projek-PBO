<!DOCTYPE html>
<html lang="id" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{base :: head(title='Testimoni Pelanggan')}"></head>
<body>
    <div th:replace="~{base :: toast}"></div>
    <div th:replace="~{base :: navbar}"></div>
    
    <div class="d-flex" style="margin-top: 70px;">
        <div th:replace="~{base :: sidebar}"></div>
        
        <div class="content-area flex-grow-1 p-4">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h2 class="text-wood"><i class="fas fa-star me-2"></i>Testimoni Pelanggan</h2>
                <button class="btn btn-sage" data-bs-toggle="modal" data-bs-target="#testimoniModal" onclick="resetForm()">
                    <i class="fas fa-plus me-1"></i>Beri Testimoni
                </button>
            </div>
            
            <div th:if="${success}" class="alert alert-success">
                <i class="fas fa-check-circle me-2"></i> <span th:text="${success}"></span>
            </div>
            
            <div class="row">
                <div class="col-md-6 mb-4" th:each="testimoni : ${testimonials}">
                    <div class="testimoni-card">
                        <div class="d-flex align-items-center gap-3">
                            <div class="testimoni-avatar">
                                <span th:text="${#strings.substring(testimoni.name, 0, 1)}"></span>
                            </div>
                            <div>
                                <strong th:text="${testimoni.name}"></strong>
                                <div class="rating-star">
                                    <span th:each="i,stat : ${#numbers.sequence(1, testimoni.rating)}">★</span>
                                    <span th:each="i,stat : ${#numbers.sequence(testimoni.rating+1, 5)}">☆</span>
                                </div>
                            </div>
                            <span class="badge bg-success ms-auto" th:if="${testimoni.approved}">Disetujui</span>
                        </div>
                        <p class="mt-3 text-muted" th:text="${testimoni.message}"></p>
                        <small class="text-muted">
                            <i class="far fa-calendar-alt me-1"></i>
                            <span th:text="${#temporals.format(testimoni.createdAt, 'dd MMM yyyy')}"></span>
                        </small>
                        <button class="btn btn-sm btn-danger mt-2" th:if="${testimoni.user != null and testimoni.user.id == session.loggedUser.id}" th:onclick="'deleteTestimoni(' + ${testimoni.id} + ')'">
                            <i class="fas fa-trash"></i> Hapus
                        </button>
                    </div>
                </div>
                <div th:if="${#lists.isEmpty(testimonials)}" class="col-12 text-center py-5">
                    <i class="fas fa-star fa-3x text-muted mb-2"></i>
                    <p class="text-muted">Belum ada testimoni. Jadilah yang pertama!</p>
                </div>
            </div>
            
            <!-- Modal Testimoni -->
            <div class="modal fade" id="testimoniModal" tabindex="-1">
                <div class="modal-dialog">
                    <div class="modal-content">
                        <div class="modal-header bg-sage text-white">
                            <h5 class="modal-title">Beri Testimoni</h5>
                            <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                        </div>
                        <div class="modal-body">
                            <form th:action="@{/testimoni/add}" method="post">
                                <div class="mb-3">
                                    <label>Nama</label>
                                    <input type="text" name="name" class="form-control" required>
                                </div>
                                <div class="mb-3">
                                    <label>Rating</label>
                                    <select name="rating" class="form-select" required>
                                        <option value="5">⭐⭐⭐⭐⭐ - Sangat Baik</option>
                                        <option value="4">⭐⭐⭐⭐ - Baik</option>
                                        <option value="3">⭐⭐⭐ - Cukup</option>
                                        <option value="2">⭐⭐ - Kurang</option>
                                        <option value="1">⭐ - Buruk</option>
                                    </select>
                                </div>
                                <div class="mb-3">
                                    <label>Testimoni</label>
                                    <textarea name="message" class="form-control" rows="3" required></textarea>
                                </div>
                                <button type="submit" class="btn btn-sage w-100">Kirim Testimoni</button>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <div th:replace="~{base :: scripts}"></div>
    
    <style>
        .testimoni-card {
            background: white;
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            height: 100%;
        }
        .testimoni-avatar {
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, #8BA888, #A67B5B);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 20px;
            font-weight: bold;
        }
        .rating-star { color: #fbbf24; }
    </style>
    
    <script>
        function resetForm() {
            document.querySelector('#testimoniModal form').reset();
        }
        function deleteTestimoni(id) {
            if(confirm('Hapus testimoni ini?')) {
                window.location.href = '/testimoni/delete/' + id;
            }
        }
    </script>
</body>
</html>
