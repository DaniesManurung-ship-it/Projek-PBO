<!DOCTYPE html>
<html lang="id" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{base :: head(title='Profile Saya')}"></head>
<body>
    <div th:replace="~{base :: toast}"></div>
    <div th:replace="~{base :: navbar}"></div>
    
    <div class="d-flex" style="margin-top: 70px;">
        <div th:replace="~{base :: sidebar}"></div>
        
        <div class="content-area flex-grow-1 p-4">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h2 class="text-wood"><i class="fas fa-user-circle me-2"></i>Profile Saya</h2>
            </div>
            
            <!-- Alert Messages -->
            <div th:if="${success}" class="alert alert-success alert-dismissible fade show">
                <i class="fas fa-check-circle me-2"></i> <span th:text="${success}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>
            <div th:if="${error}" class="alert alert-danger alert-dismissible fade show">
                <i class="fas fa-exclamation-circle me-2"></i> <span th:text="${error}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>
            
            <div class="row">
                <!-- Informasi Profile -->
                <div class="col-md-6">
                    <div class="card shadow-sm border-0">
                        <div class="card-header bg-sage text-white">
                            <h5 class="mb-0"><i class="fas fa-user me-2"></i>Informasi Profile</h5>
                        </div>
                        <div class="card-body">
                            <form th:action="@{/profile/update}" method="post">
                                <div class="mb-3">
                                    <label class="form-label">Username</label>
                                    <input type="text" class="form-control" th:value="${user.username}" disabled>
                                    <small class="text-muted">Username tidak dapat diubah</small>
                                </div>
                                <div class="mb-3">
                                    <label class="form-label">Email</label>
                                    <input type="email" class="form-control" th:value="${user.email}" disabled>
                                    <small class="text-muted">Email tidak dapat diubah</small>
                                </div>
                                <div class="mb-3">
                                    <label class="form-label">Nama Lengkap <span class="text-danger">*</span></label>
                                    <input type="text" class="form-control" name="fullName" th:value="${user.fullName}" required>
                                </div>
                                <div class="mb-3">
                                    <label class="form-label">Nomor Telepon</label>
                                    <input type="tel" class="form-control" name="phone" th:value="${user.phone}">
                                </div>
                                <button type="submit" class="btn btn-sage w-100">
                                    <i class="fas fa-save me-1"></i> Simpan Perubahan
                                </button>
                            </form>
                        </div>
                    </div>
                </div>
                
                <!-- Ganti Password -->
                <div class="col-md-6">
                    <div class="card shadow-sm border-0">
                        <div class="card-header bg-sage text-white">
                            <h5 class="mb-0"><i class="fas fa-key me-2"></i>Ganti Password</h5>
                        </div>
                        <div class="card-body">
                            <form th:action="@{/profile/change-password}" method="post">
                                <div class="mb-3">
                                    <label class="form-label">Password Saat Ini <span class="text-danger">*</span></label>
                                    <input type="password" class="form-control" name="currentPassword" required>
                                </div>
                                <div class="mb-3">
                                    <label class="form-label">Password Baru <span class="text-danger">*</span></label>
                                    <input type="password" class="form-control" name="newPassword" required>
                                    <small class="text-muted">Minimal 6 karakter</small>
                                </div>
                                <div class="mb-3">
                                    <label class="form-label">Konfirmasi Password Baru <span class="text-danger">*</span></label>
                                    <input type="password" class="form-control" name="confirmPassword" required>
                                </div>
                                <button type="submit" class="btn btn-warning w-100">
                                    <i class="fas fa-key me-1"></i> Ganti Password
                                </button>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <div th:replace="~{base :: scripts}"></div>
</body>
</html>
